name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Ruff
        run: ruff check .

      - name: Unit and Core Tests
        run: pytest -q tests/test_ema_cross.py tests/test_risk_manager.py tests/test_order_manager.py tests/test_state_store.py tests/test_decisions.py tests/test_trade_execution.py

      - name: Service Layer Smoke
        run: pytest -q tests/test_cycle.py tests/test_position_monitor.py tests/test_reconciliation.py tests/test_repair.py tests/test_status.py

      - name: State Regression Smoke
        run: pytest -q tests/test_state_fixtures.py